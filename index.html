<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Fridge v1.5</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icon.png">
    <style>
        :root { --safe: #34c759; --warning: #ff9500; --danger: #ff3b30; --primary: #007aff; --recipe: #af52de; --bg: #f2f2f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 16px; color: #1c1c1e; }
        .container { max-width: 480px; margin: 0 auto; }
        .card { background: #fff; border-radius: 20px; padding: 16px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-content { display: none; margin-top: 15px; }
        .card.active .card-content { display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 15px; margin-bottom: 10px; }
        .main-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; color: #fff; font-weight: 600; cursor: pointer; }
        .item { background: #f9f9f9; border-radius: 15px; padding: 14px; margin-bottom: 10px; position: relative; border: 1px solid #eee; transition: 0.2s; }
        .item:active { background: #f0f0f0; } /* 点击反馈 */
        .item-info { cursor: pointer; }
        .del-btn { position: absolute; right: 10px; top: 10px; background: #ff3b30; color: #fff; border: none; border-radius: 8px; padding: 5px 10px; font-size: 11px; }
        .edit-hint { font-size: 10px; color: var(--primary); margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">🧊 My Fridge</h2>

    <div class="card active" id="card-form">
        <div class="card-header" onclick="toggleCard('card-form')">
            <h3 id="form-title">➕ 添加食材</h3><span>▼</span>
        </div>
        <div class="card-content">
            <input type="hidden" id="edit-id">
            
            <label style="font-size:12px; color:#666">名称</label>
            <input type="text" id="in-name" placeholder="例如：苹果">
            
            <label style="font-size:12px; color:#666">购买日期</label>
            <input type="date" id="in-date">
            
            <label style="font-size:12px; color:#666">保质期 (天)</label>
            <input type="number" id="in-days" placeholder="例如：7">
            
            <button class="main-btn" style="background:var(--safe)" id="save-btn" onclick="saveToFridge()">存入冰箱</button>
            <button id="cancel-btn" onclick="resetForm()" style="display:none; width:100%; background:none; border:none; color:#8e8e93; margin-top:10px;">取消修改</button>
        </div>
    </div>

    <div class="card active" id="card-list">
        <div class="card-header">
            <h3>📦 冰箱库存</h3>
        </div>
        <span class="edit-hint">💡 提示：点击下方条目可直接修改内容</span>
        <div class="card-content" id="food-list" style="display:block">
            </div>
    </div>
</div>

<script>
    const STORAGE_KEY = "FRIDGE_DATA_V1";

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('in-date').value = today;
        renderFoods();
    };

    function toggleCard(id) { document.getElementById(id).classList.toggle('active'); }

    // 保存逻辑：自动判断新增或修改
    function saveToFridge() {
        const name = document.getElementById('in-name').value;
        const date = document.getElementById('in-date').value;
        const days = document.getElementById('in-days').value;
        const editId = document.getElementById('edit-id').value;

        if (!name || !date) return alert("请填写名称和日期");

        let list = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

        if (editId) {
            // 【修改模式】找到旧的 ID 并替换
            list = list.map(item => item.id == editId ? {
                ...item,
                name: name,
                buyDate: date,
                days: parseInt(days) || 0
            } : item);
        } else {
            // 【新增模式】
            list.push({
                id: Date.now(),
                name: name,
                buyDate: date,
                days: parseInt(days) || 0
            });
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        resetForm();
        renderFoods();
    }

    // 点击条目进入编辑模式
    function startEdit(id) {
        const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        const item = list.find(i => i.id == id);
        
        if (item) {
            // 填充表单
            document.getElementById('edit-id').value = item.id;
            document.getElementById('in-name').value = item.name;
            document.getElementById('in-date').value = item.buyDate;
            document.getElementById('in-days').value = item.days;

            // 改变 UI 状态
            document.getElementById('form-title').innerText = "📝 修改食材信息";
            document.getElementById('save-btn').innerText = "保存修改";
            document.getElementById('save-btn').style.background = "var(--primary)";
            document.getElementById('cancel-btn').style.display = "block";
            
            // 自动滚动到顶部表单
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (!document.getElementById('card-form').classList.contains('active')) {
                toggleCard('card-form');
            }
        }
    }

    // 重置表单
    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('in-name').value = "";
        document.getElementById('in-days').value = "";
        document.getElementById('in-date').value = new Date().toISOString().split('T')[0];
        
        document.getElementById('form-title').innerText = "➕ 添加食材";
        document.getElementById('save-btn').innerText = "存入冰箱";
        document.getElementById('save-btn').style.background = "var(--safe)";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function deleteFood(id, event) {
        event.stopPropagation(); // 防止触发编辑模式
        if (!confirm("确定移除吗？")) return;
        let list = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]").filter(i => i.id != id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        renderFoods();
    }

    function renderFoods() {
        const box = document.getElementById('food-list');
        const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        
        box.innerHTML = list.length ? "" : '<p style="text-align:center;color:#999;padding:20px;">冰箱空空的</p>';
        
        // 按日期排序（快过期的在前）
        list.forEach(f => {
            const div = document.createElement('div');
            div.className = 'item';
            div.onclick = () => startEdit(f.id); // 点击整个卡片触发编辑
            div.innerHTML = `
                <div class="item-info">
                    <b style="font-size:16px">${f.name}</b><br>
                    <small style="color:#666">${f.buyDate} 购入 · 保质期 ${f.days} 天</small>
                </div>
                <button class="del-btn" onclick="deleteFood(${f.id}, event)">移除</button>
            `;
            box.appendChild(div);
        });
    }
</script>
</body>
</html>
