<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧊 My Fridge</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f5f5f7;
  margin: 0;
  padding: 16px;
}

.container { max-width: 460px; margin: auto; }

.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
}

button {
  background: #007aff;
  color: #fff;
  border: none;
}

#preview {
  width: 100%;
  margin-top: 10px;
  display: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🧊 My Fridge</h2>

<div class="card">
  <h3>📸 AI识别</h3>

  <input type="file" id="imageInput" accept="image/*" capture="environment">

  <img id="preview">

  <button onclick="runAI()">开始识别</button>
</div>

<div class="card">
  <h3>➕ 添加食物</h3>

  <input id="name" placeholder="名称">
  <input id="days" placeholder="保质期(天)">
  <input id="category" placeholder="分类">

  <button onclick="addFood()">添加</button>
</div>

<div class="card">
  <h3>📦 冰箱库存</h3>
  <div id="list"></div>
</div>

</div>

<script>

let currentImage = null;

document.getElementById("imageInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  currentImage = file;

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById("preview");
    img.src = e.target.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
});

/* ===== AI ===== */
async function runAI(){

  if(!currentImage) return alert("先上传图片");

  const reader = new FileReader();

  reader.onload = async function(){

    const base64 = reader.result;

    const res = await fetch("/api/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ image: base64 })
    });

    const data = await res.json();

    document.getElementById("name").value = data.name || "";
    document.getElementById("days").value = data.days || "";
    document.getElementById("category").value = data.category || "";

    alert("识别完成！");
  };

  reader.readAsDataURL(currentImage);
}

/* ===== 本地存储 ===== */
function addFood(){
  const name = document.getElementById("name").value;
  const days = document.getElementById("days").value;
  const category = document.getElementById("category").value;

  let foods = JSON.parse(localStorage.getItem("foods")) || [];

  foods.push({ name, days, category });

  localStorage.setItem("foods", JSON.stringify(foods));

  loadFoods();
}

function loadFoods(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  let foods = JSON.parse(localStorage.getItem("foods")) || [];

  foods.forEach(f => {
    const div = document.createElement("div");
    div.innerHTML = `
      <b>${f.name}</b><br>
      ⏳ ${f.days} 天<br>
      📦 ${f.category}
      <hr>
    `;
    list.appendChild(div);
  });
}

loadFoods();

</script>

</body>
</html>
