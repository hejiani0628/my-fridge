<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧊 My Fridge</title>
<style>
    body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 16px; color: #1c1c1e; }
    .container { max-width: 460px; margin: auto; }
    h2 { text-align: center; font-weight: 600; }

    /* 卡片通用样式 */
    .card {
        background: rgba(255,255,255,0.8);
        backdrop-filter: blur(20px);
        border-radius: 22px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        overflow: hidden;
    }

    /* 标题栏 - 可点击折叠 */
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
    }
    .card-header h3 { margin: 0; font-size: 17px; }
    .arrow { color: #8e8e93; transition: 0.3s; }

    /* 折叠内容区域 */
    .card-content { display: none; margin-top: 15px; }
    .card.active .card-content { display: block; }
    .card.active .arrow { transform: rotate(180deg); }

    /* UI 组件 */
    .upload-box {
        border: 2px dashed #c7c7cc; border-radius: 16px; padding: 20px;
        text-align: center; color: #8e8e93; background: #fafafa;
    }
    input {
        width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px;
        border: 1px solid #d1d1d6; box-sizing: border-box;
    }
    button {
        width: 100%; padding: 12px; margin-top: 12px; border-radius: 14px;
        border: none; background: #007aff; color: white; font-weight: 600;
    }
    #preview { width: 100%; margin-top: 10px; border-radius: 12px; display: none; }
    
    /* 列表项 */
    .item { background: white; padding: 12px; border-radius: 14px; margin-top: 8px; border: 1px solid #f0f0f5; }
</style>
</head>
<body>

<div class="container">
    <h2>🧊 My Fridge</h2>

    <div class="card active" id="aiCard">
        <div class="card-header" onclick="toggleCard('aiCard')">
            <h3>📸 AI 智能识别</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="card-content">
            <div class="upload-box" onclick="document.getElementById('imageInput').click()">
                📷 点击拍照或上传
            </div>
            <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none">
            <img id="preview">
            <button id="aiBtn" onclick="runAI()">开始识别</button>
        </div>
    </div>

    <div class="card" id="addCard">
        <div class="card-header" onclick="toggleCard('addCard')">
            <h3>➕ 添加食物信息</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="card-content">
            <input id="name" placeholder="食物名称">
            <input id="days" type="number" placeholder="保质期 (天)">
            <input id="category" placeholder="分类">
            <button onclick="addFood()" style="background:#34c759">确认添加到冰箱</button>
        </div>
    </div>

    <div class="card active" id="listCard">
        <div class="card-header" onclick="toggleCard('listCard')">
            <h3>📦 冰箱库存</h3>
            <span class="arrow">▼</span>
        </div>
        <div class="card-content">
            <div id="list"></div>
        </div>
    </div>
</div>

<script>
    let currentFile = null;

    // 折叠切换函数
    function toggleCard(id) {
        document.getElementById(id).classList.toggle('active');
    }

    // 图片压缩函数
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800;
                    let w = img.width, h = img.height;
                    if (w > max) { h = (max/w)*h; w = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    // 图片选择预览
    document.getElementById("imageInput").addEventListener("change", e => {
        const file = e.target.files[0];
        if (!file) return;
        currentFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.getElementById("preview");
            img.src = ev.target.result;
            img.style.display = "block";
        };
        reader.readAsDataURL(file);
    });

    // AI 识别逻辑
    async function runAI() {
        if (!currentFile) return alert("请先上传图片");
        const btn = document.getElementById("aiBtn");
        btn.innerText = "分析中...";
        btn.disabled = true;

        try {
            const base64 = await compressImage(currentFile);
            const res = await fetch("/api/ai", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: base64 })
            });
            const data = await res.json();
            if (res.ok) {
                // 识别成功后自动展开添加卡片并填入数据
                document.getElementById("name").value = data.name || "";
                document.getElementById("days").value = data.days || "";
                document.getElementById("category").value = data.category || "";
                document.getElementById("addCard").classList.add("active");
                alert("识别成功！已填入信息卡片。");
            } else { alert("失败：" + data.error); }
        } catch (err) { alert("网络超时"); }
        btn.innerText = "开始识别";
        btn.disabled = false;
    }

    // 添加到本地
    function addFood() {
        const name = document.getElementById("name").value;
        if (!name) return alert("名称不能为空");
        let foods = JSON.parse(localStorage.getItem("foods") || "[]");
        foods.unshift({ name, days: document.getElementById("days").value, category: document.getElementById("category").value });
        localStorage.setItem("foods", JSON.stringify(foods));
        loadFoods();
        // 清空并收起
        document.getElementById("name").value = "";
        toggleCard('addCard');
    }

    function loadFoods() {
        const list = document.getElementById("list");
        let foods = JSON.parse(localStorage.getItem("foods") || "[]");
        list.innerHTML = foods.length ? "" : "冰箱是空的";
        foods.forEach(f => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `<b>${f.name}</b> (${f.category})<br><small>⏳ ${f.days}天</small>`;
            list.appendChild(div);
        });
    }

    loadFoods();
</script>
</body>
</html>
